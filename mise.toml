[tools]
node = "24"
zola = "0.22"
pnpm = "10.28"

[tasks.format]
description = "Format all files with oxfmt"
run = "pnpm exec oxfmt ."

[tasks."generate:maps"]
description = "Generate static map images for all locations"
run = "node scripts/generate-maps.js"

[tasks.clean]
description = "Remove public directory"
run = "rm -rf public/"

[tasks."start:zola"]
description = "Start Zola dev server with live reload"
run = "zola serve"

[tasks."start:css"]
description = "Start Tailwind CSS watcher"
run = "pnpm exec tailwindcss -i ./base.css -o ./static/css/styles.css --watch"

[tasks."css:prod"]
description = "Compile and minify Tailwind CSS"
run = "pnpm exec tailwindcss -i ./base.css -o ./static/css/styles.css --minify"

[tasks."build:prod"]
description = "Full production build"
depends = ["clean", "css:prod"]
run = """
zola build
BUILD_DIR=public node scripts/build.js
cp CNAME public/
"""
