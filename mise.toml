[tools]
node = "24"
zola = "0.22"
pnpm = "10.28"
taplo = "0.10"
biome = "2.4.5"

[tasks.format]
description = "Format JS/JSON with Biome and TOML with Taplo"
run = """
biome format --write .
taplo format
"""

[tasks.clean]
description = "Remove public directory"
run = "rm -rf public/"

[tasks."start:dev"]
description = "Start local dev server with live reload"
run = "zola serve"

[tasks."css:dev"]
description = "Watch and compile Tailwind CSS"
run = "npx @tailwindcss/cli -i ./base.css -o ./static/css/styles.css --watch"

[tasks."css:prod"]
description = "Compile and minify Tailwind CSS"
run = "npx @tailwindcss/cli -i ./base.css -o ./static/css/styles.css --minify"

[tasks."build:prod"]
description = "Full production build"
depends = ["clean", "css:prod"]
run = """
zola build
BUILD_DIR=public node scripts/build.js
cp CNAME public/
"""
