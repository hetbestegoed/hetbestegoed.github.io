    image: public/foto_dans.jpg
    description: U kunt dansen en even rusten onder een genot van een hapje en drankje entree kosten 5 euro daarbij krijgt u een consumptie.
    when: Elke eerste zaterdag van de maand 20.00 - 23.00
    cost: "5 euro"

