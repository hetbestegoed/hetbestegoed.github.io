activities:
  - title: Ouderen Soos
    image: public/foto_soos.jpg
    description: Elke donderdagmiddag van 14.00 - 16.30 uur zijn er activiteiten voor ouderen.
    when: Donderdagmiddag van 14.00 - 16.30

